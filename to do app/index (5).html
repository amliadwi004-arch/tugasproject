<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — To-Do App</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --border: #2e2e3e;
      --accent: #7c6dfa;
      --accent-dim: rgba(124,109,250,0.15);
      --accent-glow: rgba(124,109,250,0.35);
      --text: #e8e8f0;
      --text-muted: #7a7a96;
      --danger: #f06060;
      --success: #4ecb8d;
      --warn: #f0a050;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2.6rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p {
      color: var(--text-muted);
      margin-top: 6px;
      font-size: 0.9rem;
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      width: 100%;
      max-width: 560px;
    }
    .stat {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      text-align: center;
    }
    .stat-number {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* Main card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      width: 100%;
      max-width: 560px;
      padding: 24px;
    }

    /* Input area */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .input-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .input-wrap input[type="text"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .input-wrap input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .meta-row {
      display: flex;
      gap: 8px;
    }
    .meta-row input[type="date"],
    .meta-row select {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.2s;
    }
    .meta-row input[type="date"]:focus,
    .meta-row select:focus {
      border-color: var(--accent);
      color: var(--text);
    }
    .meta-row select option { background: #1a1a22; }

    .btn-add {
      align-self: flex-start;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      font-size: 1.4rem;
      font-weight: 700;
      padding: 12px 18px;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      line-height: 1;
      margin-top: 0;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-add:hover { background: #9381ff; box-shadow: 0 0 18px var(--accent-glow); }
    .btn-add:active { transform: scale(0.95); }

    /* Filter tabs */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      padding: 6px 14px;
      transition: all 0.2s;
    }
    .filter-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    .filter-btn:hover:not(.active) {
      border-color: #444;
      color: var(--text);
    }
    .clear-btn {
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 6px 12px;
      transition: all 0.2s;
    }
    .clear-btn:hover { border-color: var(--danger); color: var(--danger); }

    /* Task list */
    #task-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }

    .task-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      transition: border-color 0.2s, opacity 0.2s;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .task-item:hover { border-color: #3e3e56; }
    .task-item.done { opacity: 0.55; }

    .task-check {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .task-item.done .task-check {
      background: var(--accent);
      border-color: var(--accent);
    }
    .task-check::after {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #fff;
      display: none;
    }
    .task-item.done .task-check::after { display: block; }

    .task-body { flex: 1; min-width: 0; }
    .task-text {
      font-size: 0.92rem;
      word-break: break-word;
      transition: text-decoration 0.2s;
    }
    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }
    .task-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .tag-priority {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.4px;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .tag-priority.high   { background: rgba(240,96,96,0.15);  color: var(--danger); }
    .tag-priority.medium { background: rgba(240,160,80,0.15); color: var(--warn); }
    .tag-priority.low    { background: rgba(78,203,141,0.15); color: var(--success); }

    .due-date {
      font-size: 0.72rem;
      color: var(--text-muted);
    }
    .due-date.overdue { color: var(--danger); font-weight: 600; }

    .btn-del {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px 6px;
      border-radius: 6px;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .btn-del:hover { background: rgba(240,96,96,0.15); color: var(--danger); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 40px 0 20px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
    .empty p { font-size: 0.88rem; }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .progress-bar-bg {
      flex: 1;
      height: 5px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .progress-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* Dark mode toggle (always dark here, just decorative button) */
    .footer-note {
      margin-top: 32px;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>TaskFlow</h1>
  <p>Kelola tugasmu, satu per satu.</p>
</header>

<!-- Stats -->
<div class="stats">
  <div class="stat">
    <div class="stat-number" id="stat-total">0</div>
    <div class="stat-label">Total</div>
  </div>
  <div class="stat">
    <div class="stat-number" id="stat-active">0</div>
    <div class="stat-label">Aktif</div>
  </div>
  <div class="stat">
    <div class="stat-number" id="stat-done">0</div>
    <div class="stat-label">Selesai</div>
  </div>
</div>

<div class="card">
  <!-- Input -->
  <div class="input-row">
    <div class="input-wrap">
      <input type="text" id="task-input" placeholder="Tambah tugas baru..." />
      <div class="meta-row">
        <input type="date" id="due-date" />
        <select id="priority">
          <option value="medium">⚡ Medium</option>
          <option value="high">🔴 High</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
    </div>
    <button class="btn-add" id="btn-add" title="Tambah">+</button>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <span class="progress-label" id="progress-label">0%</span>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all">Semua</button>
    <button class="filter-btn" data-filter="active">Aktif</button>
    <button class="filter-btn" data-filter="done">Selesai</button>
    <button class="clear-btn" id="btn-clear">Hapus Selesai</button>
  </div>

  <!-- Task List -->
  <ul id="task-list"></ul>
</div>

<p class="footer-note">Data tersimpan otomatis di browser kamu ✦</p>

<script>
  let tasks = JSON.parse(localStorage.getItem('taskflow_tasks') || '[]');
  let currentFilter = 'all';

  const taskInput = document.getElementById('task-input');
  const dueDateInput = document.getElementById('due-date');
  const priorityInput = document.getElementById('priority');
  const taskList = document.getElementById('task-list');
  const btnAdd = document.getElementById('btn-add');
  const btnClear = document.getElementById('btn-clear');
  const progressFill = document.getElementById('progress-fill');
  const progressLabel = document.getElementById('progress-label');

  function save() {
    localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
  }

  function formatDate(dateStr) {
    if (!dateStr) return null;
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function isOverdue(dateStr) {
    if (!dateStr) return false;
    const today = new Date(); today.setHours(0,0,0,0);
    const due = new Date(dateStr + 'T00:00:00');
    return due < today;
  }

  function render() {
    const filtered = tasks.filter(t => {
      if (currentFilter === 'active') return !t.done;
      if (currentFilter === 'done') return t.done;
      return true;
    });

    taskList.innerHTML = '';

    if (filtered.length === 0) {
      taskList.innerHTML = `
        <div class="empty">
          <div class="empty-icon">${currentFilter === 'done' ? '🎉' : '📋'}</div>
          <p>${currentFilter === 'done' ? 'Belum ada tugas yang selesai.' : 'Tidak ada tugas di sini.'}</p>
        </div>`;
    } else {
      filtered.forEach((task, idx) => {
        const realIdx = tasks.indexOf(task);
        const li = document.createElement('li');
        li.className = 'task-item' + (task.done ? ' done' : '');
        li.dataset.id = realIdx;

        const dueTxt = task.due ? formatDate(task.due) : '';
        const over = !task.done && isOverdue(task.due);

        li.innerHTML = `
          <div class="task-check" data-id="${realIdx}"></div>
          <div class="task-body">
            <div class="task-text">${escapeHtml(task.text)}</div>
            <div class="task-meta">
              <span class="tag-priority ${task.priority}">${task.priority}</span>
              ${dueTxt ? `<span class="due-date ${over ? 'overdue' : ''}">${over ? '⚠ ' : ''}${dueTxt}</span>` : ''}
            </div>
          </div>
          <button class="btn-del" data-id="${realIdx}" title="Hapus">✕</button>
        `;
        taskList.appendChild(li);
      });
    }

    updateStats();
  }

  function updateStats() {
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const active = total - done;
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-active').textContent = active;
    document.getElementById('stat-done').textContent = done;
    progressFill.style.width = pct + '%';
    progressLabel.textContent = pct + '%';
  }

  function addTask() {
    const text = taskInput.value.trim();
    if (!text) { taskInput.focus(); return; }
    tasks.unshift({
      text,
      done: false,
      due: dueDateInput.value || null,
      priority: priorityInput.value
    });
    taskInput.value = '';
    dueDateInput.value = '';
    priorityInput.value = 'medium';
    save();
    render();
    taskInput.focus();
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  btnAdd.addEventListener('click', addTask);
  taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  taskList.addEventListener('click', e => {
    const checkEl = e.target.closest('.task-check');
    const delEl = e.target.closest('.btn-del');
    if (checkEl) {
      const id = parseInt(checkEl.dataset.id);
      tasks[id].done = !tasks[id].done;
      save(); render();
    }
    if (delEl) {
      const id = parseInt(delEl.dataset.id);
      tasks.splice(id, 1);
      save(); render();
    }
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  btnClear.addEventListener('click', () => {
    tasks = tasks.filter(t => !t.done);
    save(); render();
  });

  render();
</script>
</body>
</html>
