<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Nilai Mahasiswa</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
body { background: #eef5ff; }

.header {
  background: linear-gradient(to right, #1B3A6B, #4A90D9);
  color: white;
  text-align: center;
  padding: 25px;
}
.header p { font-size: 14px; margin-top: 5px; opacity: .85; }

.container { width: 70%; margin: 30px auto; }

.card {
  background: white;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.15);
}

h2 { text-align: center; margin-bottom: 20px; color: #1B3A6B; }

label { display: block; margin-top: 12px; font-weight: bold; font-size: 14px; }

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border: 1px solid #ccc;
  border-radius: 5px;
  font-size: 14px;
}

.btn-wrap { display: flex; gap: 10px; margin-top: 15px; }

button {
  flex: 1;
  padding: 10px 20px;
  border: none;
  border-radius: 5px;
  color: white;
  cursor: pointer;
  font-size: 14px;
}

.btn-hitung { background: #1B3A6B; }
.btn-hitung:hover { background: #2A5298; }
.btn-reset { background: #888; }
.btn-reset:hover { background: #666; }

#hasil {
  display: none;
  margin-top: 25px;
  background: #f0f6ff;
  padding: 20px;
  border-radius: 10px;
  border-left: 4px solid #4A90D9;
}

#hasil p { margin: 8px 0; font-size: 14px; }

.grade {
  font-size: 2.5rem;
  font-weight: bold;
  text-align: center;
  margin: 10px 0;
}

.keterangan {
  text-align: center;
  font-size: 14px;
  padding: 6px 16px;
  border-radius: 20px;
  display: inline-block;
  margin: 0 auto;
  width: 100%;
}

@media(max-width: 600px){ .container{ width: 95%; } }
</style>
</head>
<body>

<div class="header">
  <h1>Kalkulator Nilai Mahasiswa</h1>
  <p>Hitung nilai akhir dan grade secara otomatis</p>
</div>

<div class="container">
  <div class="card">
    <h2>Input Nilai</h2>

    <label>Nama Mahasiswa</label>
    <input type="text" id="nama" placeholder="Masukkan nama lengkap">

    <label>Nama Mata Kuliah</label>
    <input type="text" id="matkul" placeholder="Contoh: Pemrograman Web">

    <label>Jumlah SKS</label>
    <select id="sks" onchange="updatePertemuan()" style="width:100%;padding:10px;margin-top:5px;border:1px solid #ccc;border-radius:5px;font-size:14px;">
      <option value="">-- Pilih SKS --</option>
      <option value="2">2 SKS (14 pertemuan)</option>
      <option value="3">3 SKS (21 pertemuan)</option>
    </select>

    <label>Jumlah Kehadiran</label>
    <input type="number" id="hadir" placeholder="Contoh: 12" min="0">
    <small id="infoPertemuan" style="color:#4A90D9;font-size:12px;margin-top:4px;display:block;"></small>

    <label>Nilai Tugas (0–100)</label>
    <input type="number" id="tugas" placeholder="Contoh: 80" min="0" max="100">

    <label>Nilai UTS (0–100)</label>
    <input type="number" id="uts" placeholder="Contoh: 75" min="0" max="100">

    <label>Nilai UAS (0–100)</label>
    <input type="number" id="uas" placeholder="Contoh: 85" min="0" max="100">

    <div class="btn-wrap">
      <button class="btn-hitung" onclick="hitung()">Hitung Nilai</button>
      <button class="btn-reset" onclick="resetForm()">Reset</button>
    </div>

    <div id="hasil">
      <h2>Hasil Perhitungan</h2>
      <p><b>Nama:</b> <span id="hNama"></span></p>
      <p><b>Mata Kuliah:</b> <span id="hMatkul"></span></p>
      <p><b>Nilai Tugas:</b> <span id="hTugas"></span></p>
      <p><b>Nilai UTS:</b> <span id="hUts"></span></p>
      <p><b>Nilai UAS:</b> <span id="hUas"></span></p>
      <p><b>Nilai Akhir:</b> <span id="hAkhir"></span></p>
      <p><b>Kehadiran:</b> <span id="hHadir"></span></p>
      <p><b>Persentase Hadir:</b> <span id="hPersen"></span></p>
      <div id="hAbsenKet" style="font-size:13px;padding:6px 12px;border-radius:8px;margin:6px 0;"></div>
      <div class="grade" id="hGrade"></div>
      <div class="keterangan" id="hKeterangan"></div>
    </div>
  </div>
</div>

<script>
function hitung() {
  let nama   = document.getElementById("nama").value;
  let matkul = document.getElementById("matkul").value;
  let tugas  = parseFloat(document.getElementById("tugas").value);
  let uts    = parseFloat(document.getElementById("uts").value);
  let uas    = parseFloat(document.getElementById("uas").value);

  let sks = document.getElementById("sks").value;
  let hadir = parseInt(document.getElementById("hadir").value);
  let totalPertemuan = sks === "2" ? 14 : sks === "3" ? 21 : 0;

  if (!nama || !matkul || !sks || isNaN(hadir) || isNaN(tugas) || isNaN(uts) || isNaN(uas)) {
    alert("Semua data wajib diisi!"); return;
  }
  if ([tugas, uts, uas].some(n => n < 0 || n > 100)) {
    alert("Nilai harus antara 0 sampai 100!"); return;
  }

  // bobot: tugas 30%, UTS 30%, UAS 40%
  let akhir = (tugas * 0.3) + (uts * 0.3) + (uas * 0.4);

  let grade, warna, ket;
  if (akhir >= 85)      { grade = "A";  warna = "#1b5e20"; ket = "✅ Lulus — Sangat Memuaskan"; }
  else if (akhir >= 75) { grade = "B";  warna = "#1565c0"; ket = "✅ Lulus — Memuaskan"; }
  else if (akhir >= 65) { grade = "C";  warna = "#e65100"; ket = "✅ Lulus — Cukup"; }
  else if (akhir >= 55) { grade = "D";  warna = "#b71c1c"; ket = "⚠️ Lulus Bersyarat"; }
  else                  { grade = "E";  warna = "#4a0000"; ket = "❌ Tidak Lulus"; }

  let persen = ((hadir / totalPertemuan) * 100).toFixed(1);
  let lulusAbsen = hadir >= (totalPertemuan * 0.75);
  document.getElementById("hHadir").textContent = hadir + " / " + totalPertemuan + " pertemuan";
  document.getElementById("hPersen").textContent = persen + "%";
  let absenEl = document.getElementById("hAbsenKet");
  if (lulusAbsen) {
    absenEl.textContent = "✅ Kehadiran mencukupi syarat ujian";
    absenEl.style.background = "#e8f5e9"; absenEl.style.color = "#1b5e20";
  } else {
    absenEl.textContent = "❌ Kehadiran kurang dari 75% — tidak boleh mengikuti ujian";
    absenEl.style.background = "#ffebee"; absenEl.style.color = "#b71c1c";
  }

  document.getElementById("hNama").textContent   = nama;
  document.getElementById("hMatkul").textContent = matkul;
  document.getElementById("hTugas").textContent  = tugas;
  document.getElementById("hUts").textContent    = uts;
  document.getElementById("hUas").textContent    = uas;
  document.getElementById("hAkhir").textContent  = akhir.toFixed(2);

  let gradeEl = document.getElementById("hGrade");
  gradeEl.textContent = grade;
  gradeEl.style.color = warna;

  let ketEl = document.getElementById("hKeterangan");
  ketEl.textContent = ket;
  ketEl.style.background = warna + "22";
  ketEl.style.color = warna;

  document.getElementById("hasil").style.display = "block";
}

function updatePertemuan() {
  let sks = document.getElementById("sks").value;
  let info = document.getElementById("infoPertemuan");
  let hadir = document.getElementById("hadir");
  if (sks === "2") {
    info.textContent = "Total pertemuan: 14. Minimal hadir 75% = 11 pertemuan.";
    hadir.max = 14; hadir.placeholder = "Maks 14";
  } else if (sks === "3") {
    info.textContent = "Total pertemuan: 21. Minimal hadir 75% = 16 pertemuan.";
    hadir.max = 21; hadir.placeholder = "Maks 21";
  } else {
    info.textContent = "";
    hadir.placeholder = "Contoh: 12";
  }
}

function resetForm() {
  ["nama","matkul","hadir","tugas","uts","uas"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("sks").value = "";
  document.getElementById("infoPertemuan").textContent = "";
  document.getElementById("hasil").style.display = "none";
}
</script>
</body>
</html>
