<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Toko Elektronik</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#eef5ff;
}

.header{
    background:linear-gradient(to right,#4facfe,#00c6ff);
    color:white;
    text-align:center;
    padding:25px;
}

.container{
    width:70%;
    margin:30px auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:12px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:5px;
    color:white;
    cursor:pointer;
    margin-top:15px;
}

.btn-hitung{
    background:green;
}

.btn-reset{
    background:purple;
}

#hasil{
    display:none;
    margin-top:25px;
    background:#f5f5f5;
    padding:20px;
    border-radius:10px;
}

#hasil p{
    margin:10px 0;
}

</style>

</head>
<body>

<div class="header">
    <h1>Selamat Datang di Toko Elektronik</h1>
    <p>Belanja lebih mudah dengan perhitungan otomatis</p>
</div>

<div class="container">

<div class="card">

<h2>Form Transaksi</h2>

<label>Nama Pelanggan</label>
<input type="text" id="pelanggan">

<label>Nama Produk</label>
<input type="text" id="produk">

<label>Harga Produk</label>
<input type="number" id="harga">

<label>Jumlah Pembelian</label>
<input type="number" id="jumlah">

<br>

<button class="btn-hitung" onclick="hitung()">
Hitung
</button>

<button class="btn-reset" onclick="resetForm()">
Reset
</button>

<div id="hasil">

<h2>Hasil Perhitungan</h2>

<p>
<b>Nama Pelanggan :</b>
<span id="hasilPelanggan"></span>
</p>

<p>
<b>Nama Produk :</b>
<span id="hasilProduk"></span>
</p>

<p>
<b>Total Belanja :</b>
Rp <span id="hasilBelanja"></span>
</p>

<p>
<b>Potongan :</b>
Rp <span id="hasilPotongan"></span>
</p>

<p>
<b>Total Bayar :</b>
Rp <span id="hasilBayar"></span>
</p>

</div>

</div>

</div>

<script>

function hitung(){

let pelanggan =
document.getElementById("pelanggan").value;

let produk =
document.getElementById("produk").value;

let harga =
parseFloat(document.getElementById("harga").value);

let jumlah =
parseInt(document.getElementById("jumlah").value);

if(
pelanggan=="" ||
produk=="" ||
isNaN(harga) ||
isNaN(jumlah)
){
alert("Semua data wajib diisi!");
return;
}

let totalBelanja = harga * jumlah;

let potongan = 0;

if(totalBelanja >= 10000000){
potongan = 50000;
}
else if(totalBelanja >= 5000000){
potongan = 25000;
}
else{
potongan = 10000;
}

let totalBayar = totalBelanja - potongan;

document.getElementById("hasilPelanggan").innerHTML = pelanggan;

document.getElementById("hasilProduk").innerHTML = produk;

document.getElementById("hasilBelanja").innerHTML =
totalBelanja.toLocaleString("id-ID");

document.getElementById("hasilPotongan").innerHTML =
potongan.toLocaleString("id-ID");

document.getElementById("hasilBayar").innerHTML =
totalBayar.toLocaleString("id-ID");

document.getElementById("hasil").style.display="block";

}

function resetForm(){

document.getElementById("pelanggan").value="";
document.getElementById("produk").value="";
document.getElementById("harga").value="";
document.getElementById("jumlah").value="";

document.getElementById("hasil").style.display="none";

}

</script>

</body>
</html>
